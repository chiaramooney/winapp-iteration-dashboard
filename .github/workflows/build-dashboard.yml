name: Build & Deploy Dashboard

on:
  push:
    branches: [main]
  schedule:
    # 06:00 UTC every day — collects the previous day's data.
    - cron: "0 6 * * *"
  workflow_dispatch:
    inputs:
      dates:
        description: >-
          Date(s) to fetch. Leave blank for yesterday (default).
          Use "YYYY-MM-DD" for one day, "YYYY-MM-DD YYYY-MM-DD" for a day range,
          "YYYY-MM" for one month, or "YYYY-MM YYYY-MM" to backfill a month range.
        required: false
        default: ""

permissions:
  contents: write   # commit the updated docs/data.json
  pages: write      # deploy to GitHub Pages
  id-token: write   # required by deploy-pages

concurrency:
  group: dashboard-pages
  cancel-in-progress: false

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deploy.outputs.page_url }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node.js
        # Only needed when we refresh data (schedule / manual run).
        if: github.event_name != 'push'
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        if: github.event_name != 'push'
        run: npm ci

      - name: Fetch data
        # A push just redeploys the committed data.json. Scheduled and manual
        # runs refresh it first.
        if: github.event_name != 'push'
        env:
          # A PAT with `repo` + `read:project` scope. The default GITHUB_TOKEN
          # cannot read the other repos or the org project board.
          GITHUB_TOKEN: ${{ secrets.DASHBOARD_TOKEN }}
        run: node build-data.js ${{ github.event.inputs.dates }}

      - name: Commit updated data
        if: github.event_name != 'push'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add docs/data.json
          if git diff --staged --quiet; then
            echo "No data changes to commit."
          else
            git commit -m "chore: update dashboard data [skip ci]"
            git push
          fi

      - name: Configure Pages
        uses: actions/configure-pages@v5

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: docs

      - name: Deploy to GitHub Pages
        id: deploy
        uses: actions/deploy-pages@v4
