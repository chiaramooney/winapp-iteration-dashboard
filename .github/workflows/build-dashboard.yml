name: Build & Deploy Dashboard

on:
  schedule:
    # 06:00 UTC on the 1st of every month — collects the previous month.
    - cron: "0 6 1 * *"
  workflow_dispatch:
    inputs:
      months:
        description: >-
          Month(s) to fetch. Leave blank for the previous calendar month.
          Use "YYYY-MM" for one month, or "YYYY-MM YYYY-MM" to backfill a range.
        required: false
        default: ""

permissions:
  contents: write   # commit the updated docs/data.json
  pages: write      # deploy to GitHub Pages
  id-token: write   # required by deploy-pages

concurrency:
  group: dashboard-pages
  cancel-in-progress: false

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deploy.outputs.page_url }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Fetch data
        env:
          # A PAT with `repo` + `read:project` scope. The default GITHUB_TOKEN
          # cannot read the other repos or the org project board.
          GITHUB_TOKEN: ${{ secrets.DASHBOARD_TOKEN }}
        run: node build-data.js ${{ github.event.inputs.months }}

      - name: Commit updated data
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add docs/data.json
          if git diff --staged --quiet; then
            echo "No data changes to commit."
          else
            git commit -m "chore: update dashboard data [skip ci]"
            git push
          fi

      - name: Configure Pages
        uses: actions/configure-pages@v5

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: docs

      - name: Deploy to GitHub Pages
        id: deploy
        uses: actions/deploy-pages@v4
